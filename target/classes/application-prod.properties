server.port=8080
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

app.jwt.secret=${JWT_SECRET}

app.frontend-url=${FRONTEND_URL:https://demowebsite.com}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://demowebsite.com}
app.reminder.mock-mode=${REMINDER_MOCK_MODE:false}
