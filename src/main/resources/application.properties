spring.application.name=billing
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
app.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

ollama.enabled=${OLLAMA_ENABLED:true}
ollama.base-url=${OLLAMA_BASE_URL:}
ollama.model=${OLLAMA_MODEL:qwen3:8b}

ai.chat.draft-expiration-minutes=${AI_CHAT_DRAFT_EXPIRATION_MINUTES:15}
ai.chat.rate-limit.user-per-minute=${AI_CHAT_USER_RATE_LIMIT_PER_MINUTE:20}
ai.chat.rate-limit.company-per-minute=${AI_CHAT_COMPANY_RATE_LIMIT_PER_MINUTE:120}
